<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCUTDoll </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1>SCUTDoll 3rd</h1>
                <span class="subtitle">Happhire Dew</span>
            </div>
        </header>

        <section class="hero">
            <div class="hero-content">
                <div class="event-info">
                    <div class="event-date">
                        <span class="date-year">2026</span>
                        <div class="date-row">
                            <span class="date-month">3月</span>
                            <span class="date-day">28-29日</span>
                        </div>
                    </div>
                    <div class="event-location">
                        <span>广州·海珠湖</span>
                    </div>
                </div>
                <div class="hero-image">
                    <img src="images/0.jpg" alt="" class="hero-img">
                </div>
            </div>
        </section>

        <section class="details-section">
            <h2 class="section-title">活动详情</h2>
            <div class="details-content">
                <div class="detail-card">
                    <div class="detail-text">
                        <h3>娃娃聚会</h3>
                        <p>与志同道合的爱好者一起分享快乐</p>
                    </div>
                </div>
                <div class="detail-card detail-card-right">
                    <div class="detail-text">
                        <h3>精彩活动</h3>
                        <p>丰富的互动体验和展示环节</p>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-text">
                        <h3>创意工坊</h3>
                        <p>学习娃娃制作和装饰技巧</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="videos-section">
            <h2 class="section-title">精彩视频</h2>
            <div class="video-list">
                <div class="video-item">
                    <div class="video-thumbnail">
                        <img src="images/2.jpg" alt="" class="video-img">
                    </div>
                    <div class="video-info">
                        <span class="video-tag">SD2nd 正片</span>
                        <h3 class="video-title">梦回岭南 ~ Doll Weekend 14</h3>
                    </div>
                </div>
                <div class="video-item video-item-right">
                    <div class="video-thumbnail">
                        <img src="images/1.jpg" alt="" class="video-img">
                    </div>
                    <div class="video-info">
                        <span class="video-tag">SD1st 正片</span>
                        <h3 class="video-title">首次在江浙沪开的DW，有哪些难忘的瞬间？</h3>
                    </div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <div class="footer-content">
                <div class="footer-logo">SCUTDoll</div>
                <div class="footer-links">
                    <a href="#" class="footer-link">关于我们</a>
                    <a href="#" class="footer-link">联系方式</a>
                    <a href="#" class="footer-link">社交媒体</a>
                </div>
                <div class="footer-copyright">
                    © 2026 ?. All rights reserved.
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
